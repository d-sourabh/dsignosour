# Netlify configuration for Vite + React Router

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — every route serves index.html so React Router can take over.
# Without this, /work/fss-transformation etc. would 404 on direct visit or refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
